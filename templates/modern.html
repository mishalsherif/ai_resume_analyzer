<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #f6f8fb }
      .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,0.08) }
      pre { white-space: pre-wrap; font-size: 13px }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>{{ title }}</h2>
      <pre>{{ content }}</pre>
    </div>
  </body>
</html>
